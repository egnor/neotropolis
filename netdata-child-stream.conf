# netdata streaming config for child nodes (Pi nodes, etc.)
#
# Install: sudo cp netdata-child-stream.conf /etc/netdata/stream.conf
# Then: sudo systemctl restart netdata
#
# Generate the API key UUID from a passphrase:
#   uuidgen -n @oid -s -N "your secret phrase"
# Replace STREAM_API_KEY below with the output.

[stream]
	enabled = yes
	destination = egnor-2020.ofb.net:19999
	api key = 863719f0-df4b-54a5-9cf2-9641e21db01d
